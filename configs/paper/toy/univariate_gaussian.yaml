data:
  base_prior:
    _target_: src.distributions.gaussian.Gaussian
    mu: 2
    sigma: 4
  candidate_prior:
    _target_: src.distributions.gaussian.Gaussian
    mu: 2
    sigma: 4
  true_dgp:
    _target_: src.distributions.gaussian.Gaussian
    mu: 3
    sigma: 2
  loss:
    _target_: src.losses.gaussian_log_likelihood.GaussianLogLikelihood
    mu: 3
    sigma: 2
  loss_lr: 1.0
  loss_lr_init: 1.0
  observations_num: 100
  observations_path: null # data/observations.npy
  posterior_samples_path: null # data/posterior_samples.npy
  prior_samples_path: null # data/prior_samples.npy
  posterior_samples_num: 1000
  prior_samples_num: 1000

model:
  _target_: src.bayesian_model.gaussian.SimpleGaussianModel

fd:
  optimize:
    prior:
      Gaussian:
          parameters_box_range:
            ranges:
              mu: [ -10, 10]
              sigma: [2, 5]
            nums:
              mu: 21
              sigma: 4
      nonparametric:
        basis_funcs_type: MaternBasisFunction
        basis_funcs_kwargs: {"num_basis_functions": 5, "method": "kmeans", "scale_multiplier": 1}
        base_function: src.distributions.gaussian.Gaussian

      LogNormal:
          parameters_box_range:
            ranges:
              mu_log: [ -10, 10]
              sigma_log: [2, 5]
            nums:
              mu_log: 21
              sigma_log: 4

    loss:
      GaussianLogLikelihood:
        parameters_box_range:
          ranges:
            lr: [0.5, 2.5]
          nums:
            lr: 9

flags:
  plots:
    output_dir: outputs/paper/plots/fisher/univariate
playground:
  save_json: True
  save_csv: True
