data:
  base_prior:
    _target_: src.distributions.gaussian.MultivariateGaussian
    mu: [2.0, 3.0]
    cov: [[4.0, 0.0], [0.0, 4.0]]

  true_dgp:
    _target_: src.distributions.gaussian.MultivariateGaussian
    mu: [3.0, 3.0]
    cov: [[4.0, 0.0], [0.0, 4.0]]

  loss:
    _target_: src.losses.gaussian_log_likelihood.MultivariateGaussianLogLikelihood
    mu: [3.0, 3.0]
    cov: [[4.0, 0.0], [0.0, 4.0]]

  loss_lr: 1
  observations_num: 500
  posterior_samples_num: 5000

model:
  _target_: src.bayesian_model.gaussian.MultivariateGaussianModel

ksd:
  kernel:
    _target_: src.kernels.inverse_multiquadric.InverseMultivariateMultiquadricKernel
    lengthscale: [[1.0, 0.0], [0.0, 1.0]]
    alpha: 0.5
    heuristic: False

  optimize:
    prior:
      MultivariateGaussian:
        parameters_box_range:
          ranges:
            mu:
              0: [-4, 5]
              1: [-4, 5]
            cov:
              "0_0": [2.0, 3.0]
              "1_1": [2.0, 3.0]
              "0_1": [0.0, 0.0]
              "1_0": [0.0, 0.0]
          nums:
            mu:
              0: 5
              1: 5
            cov:
              "0_0": 2
              "1_1": 2
              "0_1": 1
              "1_0": 1

flags:
  plots:
    generate_plots:
      heatmap: False
      line_plot: False
      density_plot: True
    output_dir: outputs/paper/plots/multivariate