#          - name: theta_2
#            family: LogNormal
#            parameters_box_range:
#              ranges:
#                mu_log: [ -22, -19 ]
#                sigma_log: [ 0.5, 0.7 ]
#              nums:
#                mu_log: 4
#                sigma_log: 11
#          - name: theta_3
#            family: Gamma
#            parameters_box_range:
#              ranges:
#                alpha: [ 3, 5 ]
#                theta: [ 1e9, 2e9 ]
#              nums:
#                alpha: 3
#                theta: 11
#          - name: theta_4
#            family: LogNormal
#            parameters_box_range:
#              ranges:
#                mu_log: [ -24, -21 ]
#                sigma_log: [ 0.5, 0.7 ]
#              nums:
#                mu_log: 4
#                sigma_log: 11
          - name: theta_1
            family: LogNormal
            parameters_box_range:
              ranges:
                mu_log:   [ 0.85, 1.95 ]
                sigma_log: [ 0.40, 0.90 ]
              nums:
                mu_log: 4
                sigma_log: 11

          - name: theta_2
            family: LogNormal
            parameters_box_range:
              ranges:
                mu_log:   [ 0.95, 1.75 ]
                sigma_log: [ 0.45, 0.80 ]
              nums:
                mu_log: 4
                sigma_log: 11

          - name: theta_3
            family: LogNormal
            parameters_box_range:
              ranges:
                mu_log:   [ 2.90, 3.70 ]
                sigma_log: [ 1.20, 1.90 ]
              nums:
                mu_log: 4
                sigma_log: 11

          - name: theta_4
            family: LogNormal
            parameters_box_range:
              ranges:
                mu_log:   [ 0.95, 1.75 ]
                sigma_log: [ 0.45, 0.80 ]
              nums:
                mu_log: 4
                sigma_log: 11

      nonparametric:
        basis_funcs_type:  SigmoidBasisFunctionMultidim # PolynomialBasisFunctionMultidim # SigmoidBasisFunctionMultidim  # RBFBasisFunctionMultidim
        basis_funcs_kwargs: { "num_basis_functions": 15, "method": "kmeans", "scale":null, "scale_multiplier": 1, "metric": "full" } # polynomial {"degree":3}  # sigmoid { "num_basis_functions": 15, "method": "farthest", "scale":null, "scale_multiplier": 1, "metric": "full" }   # for rbf { "num_basis_functions": 15, "method": "farthest", "lengthscale": null, "scale_multiplier": 1, "metric": "full" }
        radius_lower_bound: null
        scale_samples: False

    loss:
      GaussianLogLikelihoodWithGivenGrads:
        parameters_box_range:
          ranges:
            lr: [ 0.01, 2.5 ]
          nums:
            lr: 21

