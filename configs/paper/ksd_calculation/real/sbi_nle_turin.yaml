ksd:
  kernel:
    _target_: src.kernels.inverse_multiquadric.InverseMultivariateMultiquadricKernel
    lengthscale: null
    alpha: 0.5
    heuristic: True
  optimize:
    prior:
      Composite:
        combine_rule: product
        components:
#          - name: theta_1
#            family: LogNormal
#            parameters_box_range:
#              ranges:
#                mu_log: [ -22, -19 ]
#                sigma_log: [ 0.5, 0.7 ]
