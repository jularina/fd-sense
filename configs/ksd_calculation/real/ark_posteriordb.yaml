model:
  _target_: src.bayesian_model.posteriordb.ark.ArkBayesianModel

ksd:
  kernel:
    _target_: src.kernels.inverse_multiquadric.InverseMultivariateMultiquadricKernel
    lengthscale: null
    alpha: 0.5
    heuristic: True
  optimize:
    prior:
      Composite:
        combine_rule: product
        components:
          - name: alpha
            family: Gaussian
            parameters_box_range:
              ranges:
                mu:    [-20, -19]
                sigma: [3, 4]
              nums:
                mu: 2
                sigma: 2
          - name: beta1
            family: Gaussian
            parameters_box_range:
              ranges:
                mu:    [-20, -19]
                sigma: [3, 4]
              nums:
                mu: 2
                sigma: 2
          - name: beta2
            family: Gaussian
            parameters_box_range:
              ranges:
                mu:    [-20, -19]
                sigma: [3, 4]
              nums:
                mu: 2
                sigma: 2
          - name: beta3
            family: Gaussian
            parameters_box_range:
              ranges:
                mu:    [-20, -19]
                sigma: [3, 4]
              nums:
                mu: 2
                sigma: 2
          - name: beta4
            family: Gaussian
            parameters_box_range:
              ranges:
                mu:    [-20, -19]
                sigma: [3, 4]
              nums:
                mu: 2
                sigma: 2
          - name: beta5
            family: Gaussian
            parameters_box_range:
              ranges:
                mu:    [-20, -19]
                sigma: [3, 4]
              nums:
                mu: 2
                sigma: 2
          - name: sigma
#            family: LogNormal
#            parameters_box_range:
#              ranges:
#                mu_log: [ 1, 2]
#                sigma_log: [ 1.0, 2.0 ]
#              nums:
#                mu_log: 11
#                sigma_log: 11
            family: Gamma
            parameters_box_range:
              ranges:
                alpha: [ 1.2, 1.3]
                theta: [ 4.0, 4.1 ]
              nums:
                alpha: 2
                theta: 2
flags:
  plots:
    generate_plots:
      heatmap: false
      line_plot: false
      density_plot: true
    output_dir: outputs/paper/plots/ark

playground:
  output_prefix: ark_param
  save_json: true
  save_csv: true
