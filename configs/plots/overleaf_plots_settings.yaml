plot:
  font:
    size: 10  # match Overleaf 10pt font
    family: serif  # for LaTeX compatibility
    use_tex: true  # render text with LaTeX

  figure:
    size:
      width: 4  # in inches
      height: 3.2
    dpi: 300
    tight_layout: true

  color_palette:
    colors:
      - "#5A051A"  # cherry
      - "#EE1E52"  # pink
      - "#FF6B90"  # light-pink
      - "#1f77b4"  # blue
      - "#5b9bd5"  # lighter blue

  seaborn:
    style: "whitegrid"
    context: "paper"

  param_latex_names:
    mu: "$\\mu$"
    sigma: "$\\sigma$"
    alpha: "$\\alpha$"
    beta: "$\\beta$"

  y_axis:
    log_scale: false
