data:
  base_prior:
    _target_: src.distributions.gaussian.Gaussian
    mu: 3
    sigma: 2
  true_dgp:
    _target_: src.distributions.gaussian.Gaussian
    mu: 3
    sigma: 2
  loss:
    _target_: src.distributions.gaussian.Gaussian
    mu: 3
    sigma: 2
  observations_num: 100
  posterior_samples_num: 1000
model:
  _target_: src.bayesian_model.gaussian.SimpleGaussianModel
ksd:
  kernel:
    _target_: src.kernels.inverse_multiquadric.InverseMultiquadricKernel
    lengthscale: 1
    variance: 1
    isotropic: true
    heuristic: true
  optimize:
    prior:
      parameters_box_range:
        ranges:
          mu:
          - -2
          - 5
          sigma:
          - 1
          - 8
        nums:
          mu: 8
          sigma: 8
flags:
  plots:
    generate_plots:
      heatmap: true
      line_plot: true
    output_dir: outputs/plots
